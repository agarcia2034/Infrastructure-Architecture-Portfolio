<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identity & Access Architecture</title>

  <style>
    :root {
      --bg: #f7f9fc;
      --text-dark: #16233f;
      --text-body: #475467;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f7f9fc;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .artboard {
      width: 512px;
      height: 512px;
      background: linear-gradient(180deg, #fbfcfe 0%, #f6f8fb 100%);
      padding: 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .hero {
      margin-bottom: 20px;
    }

    .title {
      text-align: center;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text-dark);
    }

    .content {
      width: 100%;
    }

    .item {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      align-items: flex-start;
    }

    .bullet {
      width: 10px;
      height: 10px;
      margin-top: 8px;
      border-radius: 50%;
      background: #9cb3ce;
    }

    .item p {
      margin: 0;
      font-size: 18px;
      color: var(--text-body);
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="artboard">

    <div class="hero">
      <svg width="110" height="110" viewBox="0 0 128 128">
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3a8df3"/>
            <stop offset="100%" stop-color="#2576e5"/>
          </linearGradient>
        </defs>

        <path
          d="M64 18 C78 24, 92 26, 106 27 V54
             C106 82, 87 101, 64 110
             C41 101, 22 82, 22 54
             V27 C36 26, 50 24, 64 18Z"
          fill="url(#grad)"
        />

        <circle cx="64" cy="46" r="12" fill="#fff"/>
        <path d="M43 77 C43 63, 53 57, 64 57 C75 57, 85 63, 85 77Z" fill="#fff"/>
      </svg>
    </div>

    <div class="title">
      Identity & Access<br />Architecture
    </div>

    <div class="content">

      <div class="item">
        <div class="bullet"></div>
        <p>Designed identity lifecycle automation</p>
      </div>

      <div class="item">
        <div class="bullet"></div>
        <p>Built dynamic group and access models</p>
      </div>

      <div class="item">
        <div class="bullet"></div>
        <p>Enforced conditional access and security policies</p>
      </div>

    </div>

  </div>
</body>
</html>
