<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Metrics Cards — Transparent Corrected</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Inter, "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
}

.metrics-section{
    width:100%;
    padding:20px;
    background:transparent;
}

.metrics-row{
    display:flex;
    flex-wrap:nowrap;
    gap:14px;
    width:100%;
    align-items:stretch;
    background:transparent;
}

.metric-card{
    position:relative;
    flex:1 1 0;
    min-width:0;
    height:140px;
    overflow:hidden;
    background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,.96) 0 0, transparent 48%),
        linear-gradient(180deg, rgba(251,252,250,.98) 0%, rgba(247,248,246,.98) 100%);
    border:1px solid rgba(127,175,154,.38);
    border-radius:13px;
    box-shadow:
        0 10px 24px rgba(31,42,46,.075),
        inset 0 1px 0 rgba(255,255,255,.82);
    padding:11px 9px 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    text-align:center;
    isolation:isolate;
}

.metric-card::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(circle, rgba(127,175,154,.16) 0 1px, transparent 1.6px);
    background-size:24px 24px;
    opacity:.20;
    mask-image:linear-gradient(180deg, #000 0%, transparent 68%);
    pointer-events:none;
    z-index:-2;
}

.metric-card::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:9px;
    width:76px;
    height:4px;
    transform:translateX(-50%);
    background:#4f7f6b;
    border-radius:999px;
    opacity:.62;
    clip-path:polygon(0 48%, 14% 29%, 30% 53%, 49% 33%, 66% 51%, 84% 36%, 100% 45%, 100% 82%, 0 78%);
}

.metric-icon{
    position:relative;
    width:44px;
    height:44px;
    margin-bottom:8px;
    flex-shrink:0;
    display:grid;
    place-items:center;
    border-radius:999px;
    background:
        radial-gradient(circle at 32% 25%, rgba(255,255,255,.84), transparent 35%),
        var(--orb, #dde9e2);
    box-shadow:
        0 11px 22px rgba(31,42,46,.075),
        inset 0 0 0 1px rgba(255,255,255,.76);
}

.metric-icon::before,
.metric-icon::after{
    content:"";
    position:absolute;
    border-radius:999px;
    background:var(--orb, #dde9e2);
    filter:blur(4px);
    opacity:.34;
    z-index:-1;
}

.metric-icon::before{
    inset:-4px 2px 3px -3px;
}

.metric-icon::after{
    inset:4px -4px -3px 3px;
}

.metric-icon svg{
    width:29px;
    height:29px;
    display:block;
    fill:none;
    stroke:#1f2a2e;
    stroke-width:1.6;
    stroke-linecap:round;
    stroke-linejoin:round;
}

.metric-value{
    font-family:"Libre Baskerville", "Playfair Display", Georgia, serif;
    font-size:28px;
    font-weight:700;
    line-height:1;
    color:#1f2a2e;
    margin:0 0 6px;
    letter-spacing:-0.045em;
}

.metric-label{
    font-size:11.7px;
    line-height:1.25;
    font-weight:500;
    color:#4a5a5f;
    max-width:96%;
    margin:0;
}

.metric-value.green{
    color:#4f7f6b;
}

.metric-kicker{
    position:absolute;
    top:9px;
    left:10px;
    font-size:7.5px;
    line-height:1;
    letter-spacing:.21em;
    text-transform:uppercase;
    color:rgba(74,90,95,.43);
}

.metric-card:nth-child(1) .metric-icon{--orb:#dde9e2;}
.metric-card:nth-child(2) .metric-icon{--orb:#bfd3dd;}
.metric-card:nth-child(3) .metric-icon{--orb:#e7c7a6;}
.metric-card:nth-child(4) .metric-icon{--orb:#cfc9e3;}
.metric-card:nth-child(5) .metric-icon{--orb:#dde9e2;}

@media (max-width:1200px){
    .metrics-row{ gap:10px; }
    .metric-card{ padding:10px 8px 12px; }
    .metric-icon{ width:39px; height:39px; margin-bottom:7px; }
    .metric-icon svg{ width:25px; height:25px; }
    .metric-value{ font-size:25px; margin-bottom:5px; }
    .metric-label{ font-size:10.8px; }
    .metric-kicker{ font-size:7px; left:8px; }
}

@media (max-width:900px){
    .metrics-row{ gap:8px; }
    .metric-card{ padding:8px 6px 11px; }
    .metric-icon{ width:34px; height:34px; margin-bottom:6px; }
    .metric-icon svg{ width:22px; height:22px; }
    .metric-value{ font-size:21px; margin-bottom:5px; }
    .metric-label{ font-size:9.8px; line-height:1.22; }
    .metric-kicker{ display:none; }
}
</style>
</head>
<body>

<section class="metrics-section">
    <div class="metrics-row">

        <!-- Card 1 -->
        <div class="metric-card">
            <span class="metric-kicker">Identity</span>
            <div class="metric-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 30c0-7.7 6.3-14 14-14s14 6.3 14 14"/>
                    <path d="M22 30h20"/>
                    <path d="M24 42h16"/>
                    <path d="M28 50h8"/>
                    <path d="M26 30v-6c0-3.3 2.7-6 6-6s6 2.7 6 6v6"/>
                    <path d="M16 30h32v8c0 2.2-1.8 4-4 4H20c-2.2 0-4-1.8-4-4v-8Z"/>
                    <path d="M32 35v7"/>
                    <circle cx="32" cy="34.5" r="1.8"/>
                </svg>
            </div>
            <div class="metric-value">600+</div>
            <p class="metric-label">Automated identity workflows</p>
        </div>

        <!-- Card 2 -->
        <div class="metric-card">
            <span class="metric-kicker">Endpoint</span>
            <div class="metric-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="16" width="34" height="23" rx="3"/>
                    <path d="M21 47h20"/>
                    <path d="M26 39v8"/>
                    <path d="M34 39v8"/>
                    <rect x="42" y="25" width="12" height="23" rx="3"/>
                    <path d="M46.5 43h3"/>
                    <path d="M17 24h18"/>
                    <path d="M17 30h11"/>
                    <path d="M17 54h34"/>
                </svg>
            </div>
            <div class="metric-value">500+</div>
            <p class="metric-label">Managed enterprise devices</p>
        </div>

        <!-- Card 3 -->
        <div class="metric-card">
            <span class="metric-kicker">SaaS</span>
            <div class="metric-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="32" r="6"/>
                    <circle cx="18" cy="18" r="5"/>
                    <circle cx="46" cy="18" r="5"/>
                    <circle cx="46" cy="46" r="5"/>
                    <circle cx="18" cy="46" r="5"/>
                    <path d="M22 22l6 6"/>
                    <path d="M42 22l-6 6"/>
                    <path d="M42 42l-6-6"/>
                    <path d="M22 42l6-6"/>
                    <path d="M32 12v5"/>
                    <path d="M52 32h-5"/>
                    <path d="M32 52v-5"/>
                    <path d="M12 32h5"/>
                </svg>
            </div>
            <div class="metric-value">10+</div>
            <p class="metric-label">SaaS integrations delivered</p>
        </div>

        <!-- Card 4 -->
        <div class="metric-card">
            <span class="metric-kicker">Reliability</span>
            <div class="metric-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 44c0-9 7-16 16-16s16 7 16 16"/>
                    <path d="M22 44c0-5.7 4.3-10 10-10s10 4.3 10 10"/>
                    <path d="M32 28V14"/>
                    <path d="M24 17h16"/>
                    <path d="M32 44l9-13"/>
                    <circle cx="32" cy="44" r="3"/>
                    <path d="M14 50h36"/>
                </svg>
            </div>
            <div class="metric-value">99.9%</div>
            <p class="metric-label">Platform uptime</p>
        </div>

        <!-- Card 5 -->
        <div class="metric-card">
            <span class="metric-kicker">Growth</span>
            <div class="metric-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 49h38"/>
                    <path d="M19 49V36"/>
                    <path d="M30 49V28"/>
                    <path d="M41 49V20"/>
                    <path d="M16 32c9-9 19-10 31-20"/>
                    <path d="M39 12h10v10"/>
                    <path d="M47 12L33 26"/>
                </svg>
            </div>
            <div class="metric-value green">25%</div>
            <p class="metric-label">Licensing cost reduction</p>
        </div>

    </div>
</section>

</body>
</html>
