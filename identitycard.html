<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identity &amp; Access Architecture</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text-dark: #16233f;
      --text-body: #475467;
      --blue: #2f80ed;
      --blue-soft: #eaf3ff;
      --blue-soft-2: #d8e9ff;
      --bullet: #9bb7db;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .artboard {
      position: relative;
      width: 512px;
      height: 512px;
      overflow: hidden;
      background:
        radial-gradient(circle at 74% 18%, rgba(47, 128, 237, 0.08) 0 42px, transparent 43px),
        radial-gradient(circle at 24% 22%, rgba(47, 128, 237, 0.06) 0 24px, transparent 25px),
        linear-gradient(180deg, #fbfcfe 0%, #f6f8fb 100%);
      padding: 34px 34px 28px 34px;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      background: rgba(47, 128, 237, 0.06);
      filter: blur(0.2px);
    }

    .orb.one {
      width: 160px;
      height: 160px;
      top: 18px;
      left: 182px;
    }

    .orb.two {
      width: 108px;
      height: 108px;
      top: 58px;
      left: 272px;
      background: rgba(47, 128, 237, 0.045);
    }

    .dots {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(4, 6px);
      gap: 7px;
      opacity: 0.5;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b8d2f5;
    }

    .dots.top {
      top: 78px;
      left: 150px;
    }

    .dots.right {
      top: 132px;
      left: 344px;
    }

    .hero {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      margin-top: 4px;
      margin-bottom: 20px;
    }

    .title {
      position: relative;
      z-index: 2;
      text-align: center;
      margin: 0 8px 22px;
      font-size: 34px;
      line-height: 1.08;
      font-weight: 750;
      letter-spacing: -0.03em;
      color: var(--text-dark);
    }

    .content {
      position: relative;
      z-index: 2;
      margin-top: 2px;
      padding: 0 4px;
    }

    .item {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 14px;
      align-items: start;
      margin-bottom: 22px;
    }

    .bullet {
      width: 12px;
      height: 12px;
      margin-top: 10px;
      border-radius: 50%;
      background: linear-gradient(180deg, #b9c9de 0%, #9cb3ce 100%);
      box-shadow: 0 0 0 4px rgba(156, 179, 206, 0.08);
    }

    .item p {
      margin: 0;
      color: var(--text-body);
      font-size: 19px;
      line-height: 1.42;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    svg {
      display: block;
    }
  </style>
</head>
<body>
  <div class="artboard">
    <div class="orb one"></div>
    <div class="orb two"></div>

    <div class="dots top">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="dots right">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="hero">
      <svg width="128" height="128" viewBox="0 0 128 128" aria-hidden="true">
        <defs>
          <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3a8df3"></stop>
            <stop offset="100%" stop-color="#2576e5"></stop>
          </linearGradient>
        </defs>

        <ellipse cx="64" cy="60" rx="58" ry="50" fill="rgba(47,128,237,0.08)"></ellipse>

        <path
          d="M64 18
             C78 24, 92 26, 106 27
             V54
             C106 82, 87 101, 64 110
             C41 101, 22 82, 22 54
             V27
             C36 26, 50 24, 64 18Z"
          fill="url(#shieldGrad)">
        </path>

        <circle cx="64" cy="46" r="12" fill="#ffffff"></circle>

        <path
          d="M43 77
             C43 63, 53 57, 64 57
             C75 57, 85 63, 85 77
             C79 81, 72 83, 64 83
             C56 83, 49 81, 43 77Z"
          fill="#ffffff">
        </path>

        <circle cx="94" cy="78" r="23" fill="#2f80ed"></circle>

        <path
          d="M84 78 L91 85 L105 71"
          fill="none"
          stroke="#ffffff"
          stroke-width="7"
          stroke-linecap="round"
          stroke-linejoin="round">
        </path>
      </svg>
    </div>

    <h1 class="title">Identity &amp; Access<br />Architecture</h1>

    <div class="content">
      <div class="item">
        <div class="bullet"></div>
        <p>Designed identity lifecycle automation</p>
      </div>

      <div class="item">
        <div class="bullet"></div>
        <p>Built dynamic group and access models</p>
      </div>

      <div class="item">
        <div class="bullet"></div>
        <p>Enforced conditional access and security policies</p>
      </div>
    </div>
  </div>
</body>
</html>
